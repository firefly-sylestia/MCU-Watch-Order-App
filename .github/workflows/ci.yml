name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '22'

jobs:
  lint-and-build:
    name: Lint and Build Web
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Verify build output
        run: |
          if [[ ! -d "dist" ]]; then
            echo "::error::Build failed - dist directory not found"
            exit 1
          fi
          
          echo "✅ Build successful"
          echo "📁 Build contents:"
          ls -la dist/

  android-build-check:
    name: Android Build Check
    runs-on: ubuntu-latest
    needs: lint-and-build
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Force Java 17 compatibility
        run: |
          find ./node_modules/@capacitor ./node_modules/@capacitor-community ./android \
            -name "*.gradle" -type f 2>/dev/null | while read -r file; do
            sed -i \
              -e 's/JavaVersion.VERSION_21/JavaVersion.VERSION_17/g' \
              -e 's/jvmTarget = "21"/jvmTarget = "17"/g' \
              -e "s/jvmTarget = '21'/jvmTarget = '17'/g" \
              -e 's/jvmToolchain(21)/jvmToolchain(17)/g' "$file"
          done

      - name: Make gradlew executable
        run: chmod +x ./android/gradlew

      - name: Build debug APK
        working-directory: ./android
        run: |
          sed -i '/org.gradle.java.home/d' gradle.properties 2>/dev/null || true
          ./gradlew --no-daemon assembleDebug

      - name: Verify APK created
        run: |
          APK_PATH=$(find ./android -name "app-debug.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "::error::Debug APK not found"
            exit 1
          fi
          
          APK_SIZE=$(ls -lh "$APK_PATH" | awk '{print $5}')
          echo "✅ Debug APK built successfully ($APK_SIZE)"
