name: Build Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: ['**']

permissions:
  contents: read

env:
  JAVA_VERSION: '17'

jobs:
  android-gradle-check:
    name: Android Gradle Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          # GitHub-hosted bash enables pipefail; disable it so yes exiting after
          # sdkmanager closes stdin does not fail an otherwise successful step.
          set +o pipefail
          yes | sdkmanager --licenses
          set -o pipefail
          sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew :androidApp:assembleDebug --no-daemon --stacktrace -PVERSION_NAME=ci-${{ github.run_number }} -PVERSION_CODE=${{ github.run_number }}
