name: Setup keystore (one-time)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - scripts/setup-keystore.sh

jobs:
  create-keystore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate one-time preset keystore
        env:
          KEYSTORE_FILE: MCUWatchOrder.keystore
          STORE_PASSWORD: 12MCU@Me
          KEY_ALIAS: mcu-app
          KEY_PASSWORD: 12MCU@Me
          CERT_NAME: MCU Viewing Order
          CERT_ORG: MCU
          CERT_CITY: New York
          CERT_STATE: New York
          CERT_COUNTRY: US
        run: |
          keytool -genkey -v \
            -keystore "$KEYSTORE_FILE" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias "$KEY_ALIAS" \
            -keypass "$KEY_PASSWORD" \
            -storepass "$STORE_PASSWORD" \
            -dname "CN=$CERT_NAME, OU=$CERT_ORG, L=$CERT_CITY, ST=$CERT_STATE, C=$CERT_COUNTRY"

          echo "KEYSTORE_BASE64=$(base64 < \"$KEYSTORE_FILE\" | tr -d '\\n')" >> $GITHUB_ENV

      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: one-time-keystore
          path: MCUWatchOrder.keystore
          retention-days: 1

      - name: Print setup values
        run: |
          echo "Use these with your repository secrets:"
          echo "KEYSTORE_PASSWORD=12MCU@Me"
          echo "KEY_ALIAS=mcu-app"
          echo "KEY_PASSWORD=12MCU@Me"
          echo "KEYSTORE_BASE64 is available in this run's logs/env output."
