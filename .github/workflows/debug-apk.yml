name: Android Debug APK Artifact

on:
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: read

env:
  JAVA_VERSION: '17'

jobs:
  build-debug:
    name: Build debug APK for PR branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR head code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: platform-tools platforms;android-36 build-tools;36.0.0

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build debug APK
        run: ./gradlew :androidApp:assembleDebug --no-daemon --stacktrace -PVERSION_NAME=pr-${{ github.event.pull_request.number || github.run_number }} -PVERSION_CODE=${{ github.run_number }}

      - name: Prepare debug APK artifact
        id: apk
        shell: bash
        run: |
          APK=$(find androidApp/build/outputs/apk/debug -name '*.apk' -type f | head -n 1)
          if [[ -z "$APK" ]]; then
            echo "Debug APK not found."
            find androidApp/build/outputs/apk -name '*.apk' -type f -print || true
            exit 1
          fi

          SAFE_REF=$(echo "${{ github.head_ref || github.ref_name }}" | tr '/[:space:]' '-' | tr -cd 'A-Za-z0-9._-')
          OUT="MCU-Viewing-Order-debug-${SAFE_REF}-${{ github.run_number }}.apk"
          cp "$APK" "$OUT"
          echo "apk_file=${OUT}" >> "$GITHUB_OUTPUT"
          ls -lh "$OUT"

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcu-viewing-order-debug-apk-${{ github.event.pull_request.number || github.run_number }}
          path: ${{ steps.apk.outputs.apk_file }}
          if-no-files-found: error
          retention-days: 14
