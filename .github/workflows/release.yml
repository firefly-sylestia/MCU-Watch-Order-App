name: Android APK Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_name:
        description: Version name to bake into the APKs, for example 6.0.0
        required: false
        type: string

permissions:
  contents: write

env:
  JAVA_VERSION: '17'

jobs:
  build-apks:
    name: Build debug and release APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            RAW_VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ inputs.version_name }}" ]]; then
            RAW_VERSION="${{ inputs.version_name }}"
          else
            RAW_VERSION=$(node -p "require('./package.json').version")
          fi

          VERSION_NAME="${RAW_VERSION#v}"
          if [[ -z "${VERSION_NAME}" ]]; then
            echo "Version name cannot be empty." >&2
            exit 1
          fi

          RELEASE_TAG="v${VERSION_NAME}"
          VERSION_CODE="${GITHUB_RUN_NUMBER}"
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "Building APKs for version ${VERSION_NAME} (${VERSION_CODE}) with release tag ${RELEASE_TAG}"

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create release keystore from secrets
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [[ -n "$KEYSTORE_BASE64" && -n "$KEYSTORE_PASSWORD" && -n "$KEY_ALIAS" && -n "$KEY_PASSWORD" ]]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
            echo "KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
            echo "HAS_SIGNING=true" >> "$GITHUB_ENV"
            echo "Release signing is configured."
          else
            echo "HAS_SIGNING=false" >> "$GITHUB_ENV"
            echo "Release signing secrets are incomplete; release APK will be unsigned."
          fi

      - name: Build debug APK
        run: ./gradlew :androidApp:assembleDebug --no-daemon --stacktrace -PVERSION_NAME=${{ steps.version.outputs.version_name }} -PVERSION_CODE=${{ steps.version.outputs.version_code }}

      - name: Build release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :androidApp:assembleRelease --no-daemon --stacktrace -PVERSION_NAME=${{ steps.version.outputs.version_name }} -PVERSION_CODE=${{ steps.version.outputs.version_code }}

      - name: Prepare APK assets
        id: assets
        shell: bash
        run: |
          DEBUG_APK=$(find androidApp/build/outputs/apk/debug -name '*.apk' -type f | head -n 1)
          RELEASE_APK=$(find androidApp/build/outputs/apk/release -name '*.apk' -type f | head -n 1)

          if [[ -z "$DEBUG_APK" || -z "$RELEASE_APK" ]]; then
            echo "Expected APKs were not found."
            find androidApp/build/outputs/apk -name '*.apk' -type f -print || true
            exit 1
          fi

          SIGN_SUFFIX="unsigned"
          if [[ "${HAS_SIGNING}" == "true" ]]; then
            SIGN_SUFFIX="signed"
          fi

          DEBUG_NAME="MCU-Viewing-Order-${{ steps.version.outputs.version_name }}-debug.apk"
          RELEASE_NAME="MCU-Viewing-Order-${{ steps.version.outputs.version_name }}-${SIGN_SUFFIX}.apk"
          cp "$DEBUG_APK" "$DEBUG_NAME"
          cp "$RELEASE_APK" "$RELEASE_NAME"

          echo "debug_apk=${DEBUG_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_apk=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"
          ls -lh "$DEBUG_NAME" "$RELEASE_NAME"

      - name: Create or verify release tag
        if: github.ref_type != 'tag'
        shell: bash
        run: |
          git fetch --tags --force
          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.version.outputs.release_tag }}" >/dev/null 2>&1; then
            echo "Release tag ${{ steps.version.outputs.release_tag }} already exists; reusing it without force-pushing."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${{ steps.version.outputs.release_tag }}" -m "Release ${{ steps.version.outputs.release_tag }}"
            git push origin "${{ steps.version.outputs.release_tag }}"
          fi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mcu-viewing-order-${{ steps.version.outputs.version_name }}-apks
          path: |
            ${{ steps.assets.outputs.debug_apk }}
            ${{ steps.assets.outputs.release_apk }}
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          name: MCU Viewing Order v${{ steps.version.outputs.version_name }}
          draft: false
          prerelease: false
          files: |
            ${{ steps.assets.outputs.debug_apk }}
            ${{ steps.assets.outputs.release_apk }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
