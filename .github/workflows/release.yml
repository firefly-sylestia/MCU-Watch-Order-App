name: Android Release APK Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '22'

jobs:
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Apply version to build files
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Update Android version
          sed -i "s/versionName \"[^\"]*\"/versionName \"$VERSION\"/" android/app/build.gradle
          # Update capacitor version
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" capacitor.config.json
          echo "Applied version $VERSION to build files"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install npm dependencies
        run: npm ci

      - name: Build web
        run: npm run build

      - name: Verify web build
        run: |
          if [ ! -d "dist" ]; then
            echo "ERROR: dist directory not created"
            exit 1
          fi
          echo "✅ Web build successful"

      - name: Sync Capacitor
        run: |
          echo "Syncing Capacitor with Android..."
          npx cap sync android

      - name: Patch Gradle for Java 17
        run: |
          find ./node_modules/@capacitor ./node_modules/@capacitor-community ./android \
            -name "*.gradle" -type f 2>/dev/null | while read -r file; do
            sed -i \
              -e 's/JavaVersion.VERSION_21/JavaVersion.VERSION_17/g' \
              -e 's/jvmTarget = "21"/jvmTarget = "17"/g' \
              -e "s/jvmTarget = '21'/jvmTarget = '17'/g" \
              -e 's/jvmToolchain(21)/jvmToolchain(17)/g' \
              "$file" 2>/dev/null || true
          done

      - name: Make gradlew executable
        run: chmod +x ./android/gradlew

      - name: Create keystore from secrets
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "⚠️  KEYSTORE_BASE64 secret not configured. Skipping signing."
            echo "SKIP_SIGNING=true" >> $GITHUB_ENV
          else
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ./android/release.keystore
            echo "SKIP_SIGNING=false" >> $GITHUB_ENV
            ls -lh ./android/release.keystore
          fi

      - name: Build release APK
        working-directory: ./android
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ "$SKIP_SIGNING" = "true" ]; then
            echo "Building unsigned release APK (signing secrets not configured)..."
            sed -i '/org.gradle.java.home/d' gradle.properties 2>/dev/null || true
            ./gradlew clean assembleDebug --no-daemon --stacktrace
          else
            echo "Building signed release APK..."
            sed -i '/org.gradle.java.home/d' gradle.properties 2>/dev/null || true
            ./gradlew clean assembleRelease --no-daemon --stacktrace
          fi

      - name: Find APK
        id: find_apk
        run: |
          if [ "$SKIP_SIGNING" = "true" ]; then
            APK=$(find ./android -name "app-debug.apk" -type f | head -1)
            APK_TYPE="unsigned"
          else
            APK=$(find ./android -name "app-release.apk" -type f | head -1)
            APK_TYPE="release"
          fi
          if [ -z "$APK" ]; then
            echo "ERROR: APK not found!"
            find ./android -name "*.apk" -type f
            exit 1
          fi
          echo "apk=$APK" >> $GITHUB_OUTPUT
          echo "apk_type=$APK_TYPE" >> $GITHUB_OUTPUT
          echo "✅ Found APK: $APK"
          ls -lh "$APK"

      - name: Prepare release asset
        run: |
          APK_PATH="${{ steps.find_apk.outputs.apk }}"
          APK_TYPE="${{ steps.find_apk.outputs.apk_type }}"
          if [ "$APK_TYPE" = "release" ]; then
            NEW_NAME="MCU-Viewing-Order-${{ steps.version.outputs.version }}-signed.apk"
          else
            NEW_NAME="MCU-Viewing-Order-${{ steps.version.outputs.version }}-unsigned.apk"
          fi
          cp "$APK_PATH" "$NEW_NAME"
          echo "✅ APK ready: $NEW_NAME"
          ls -lh "$NEW_NAME"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "MCU Viewing Order v${{ steps.version.outputs.version }}"
          draft: false
          prerelease: false
          files: MCU-Viewing-Order-${{ steps.version.outputs.version }}-${{ steps.find_apk.outputs.apk_type }}.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
